<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santé Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <aside>
            <div class="card">
                <h2>Nouvelle Séance</h2>
                <select id="type-saisie">
                    <option value="cardio">Séance Cardio</option>
                    <option value="poids">Suivi Poids</option>
                    <option value="record">Record</option>
                </select>
                <input type="date" id="date-saisie">
                <div id="dynamic-fields"></div>
                <button onclick="saveData()">Enregistrer</button>
            </div>
        </aside>

        <main>
            <div class="card">
                <h2>Historique des Séances</h2>
                <table>
                    <thead>
                        <tr><th>Date</th><th>Type</th><th>Détails</th></tr>
                    </thead>
                    <tbody id="historique-table"></tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
    <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
