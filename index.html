<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Santé Tracker</h1>
            <button id="confidentialite-btn"><i data-lucide="eye-off"></i></button>
        </header>

        <div class="bento-grid">
            <section class="card">
                <h3>Nouvelle Saisie</h3>
                <select id="type-saisie">
                    <option value="seance">Séance Cardio</option>
                    <option value="poids">Suivi Poids</option>
                    <option value="record">Nouveau Record</option>
                </select>
                <input type="date" id="date-saisie">
                <div id="dynamic-fields"></div>
                <button onclick="saveData()">Enregistrer</button>
            </section>

            <section class="card">
                <h3>Historique</h3>
                <div id="historique-list"></div>
            </section>
        </div>
    </div>
    <script src="app.js"></script>
    <script>lucide.createIcons();</script>
    <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
